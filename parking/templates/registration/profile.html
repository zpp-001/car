{% extends "base.html" %}
{% block title %}个人信息{% endblock %}
{% block page_title %}个人信息{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0"><i class="bi bi-person-circle me-2"></i>编辑个人信息</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" name="username" class="form-control" value="{{ form.username.value }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">手机号</label>
                            <input type="text" name="phone" class="form-control" value="{{ form.phone.value }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" name="email" class="form-control" value="{{ form.email.value }}">
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-2"></i>保存修改</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-secondary ms-2">返回</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
