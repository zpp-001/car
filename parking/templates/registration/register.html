{% extends "base.html" %}
{% block title %}注册 - 智能停车场管理系统{% endblock %}
{% block content %}
<div class="login-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card shadow-lg">
                    <div class="login-header">
                        <i class="bi bi-person-plus" style="font-size: 3rem;"></i>
                        <h3 class="mt-2">用户注册</h3>
                        <p class="mb-0 text-white-50">创建您的账号</p>
                    </div>
                    <div class="card-body p-4">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" name="username" class="form-control" required placeholder="请输入用户名">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">手机号</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-phone"></i></span>
                                    <input type="text" name="phone" class="form-control" required placeholder="请输入手机号">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" name="password1" class="form-control" required placeholder="请输入密码">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">确认密码</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" name="password2" class="form-control" required placeholder="再次输入密码">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2 mb-3">
                                <i class="bi bi-check-circle me-2"></i>注册
                            </button>
                            <div class="text-center">
                                <span class="text-muted">已有账号？</span>
                                <a href="{% url 'login' %}" class="text-decoration-none">立即登录</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
