{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0"><i class="bi bi-geo-alt me-2"></i>{{ title }}</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">车位编号</label>
                            <input type="text" name="space_no" class="form-control" value="{{ form.space_no.value|default:'' }}" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">车位类型</label>
                                <select name="space_type" class="form-select">
                                    <option value="temporary" {% if form.space_type.value == 'temporary' %}selected{% endif %}>临时车位</option>
                                    <option value="fixed" {% if form.space_type.value == 'fixed' %}selected{% endif %}>固定车位</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">车位状态</label>
                                <select name="status" class="form-select">
                                    <option value="free" {% if form.status.value == 'free' %}selected{% endif %}>空闲</option>
                                    <option value="occupied" {% if form.status.value == 'occupied' %}selected{% endif %}>占用</option>
                                    <option value="locked" {% if form.status.value == 'locked' %}selected{% endif %}>锁定</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">所属区域</label>
                            <input type="text" name="zone" class="form-control" value="{{ form.zone.value|default:'' }}" placeholder="例如：A区">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">绑定用户</label>
                            <select name="bound_user" class="form-select">
                                <option value="">不绑定</option>
                                {% for u in form.bound_user.field.queryset %}
                                <option value="{{ u.id }}" {% if form.bound_user.value|stringformat:'s' == u.id|stringformat:'s' %}selected{% endif %}>{{ u.username }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-2"></i>保存</button>
                        <a href="{% url 'admin_spaces' %}" class="btn btn-secondary ms-2">取消</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
