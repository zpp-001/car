{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0"><i class="bi bi-truck me-2"></i>{{ title }}</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">车牌号</label>
                            <input type="text" name="plate_number" class="form-control" required placeholder="例如：京A12345">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">车辆类型</label>
                            <select name="car_type" class="form-select">
                                <option value="small">小型车</option>
                                <option value="suv">SUV</option>
                                <option value="large">大型车</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-2"></i>保存</button>
                        <a href="{% url 'car_list' %}" class="btn btn-secondary ms-2">取消</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
